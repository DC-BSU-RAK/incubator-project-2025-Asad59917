<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - AutoMate Admin</title>
    <link rel="stylesheet" href="css/style.css">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Services</h1>
                    <div class="page-subtitle">Manage your service offerings & prices</div>
                </div>
                <div id="userBadge"></div>
            </div>

            <!-- Loading State -->
            <div id="loadingState" style="text-align: center; padding: 40px; color: var(--gray-600);">
                <div style="font-size: 32px;">⏳</div>
                <div>Loading services from Firebase...</div>
            </div>

            <!-- Main Content -->
            <div id="mainContent" style="display: none;">
                <div style="margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;">
                    <div style="font-size: 13px; color: var(--gray-600);">
                        <span id="serviceCount"></span> services available
                    </div>
                    <button class="btn btn-outline btn-sm" onclick="loadServices()">🔄 Refresh</button>
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;" id="servicesGrid"></div>
            </div>
        </main>
    </div>

    <!-- Edit Service Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Edit Service</div>
                <button class="modal-close" onclick="closeEditModal()">×</button>
            </div>
            <div class="form-group">
                <label class="form-label">Service Name</label>
                <input type="text" class="form-input" id="editName">
            </div>
            <div class="form-group">
                <label class="form-label">Base Price (AED)</label>
                <input type="number" class="form-input" id="editPrice" min="0">
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea class="form-textarea" id="editDesc" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Status</label>
                <select class="form-select" id="editActive">
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" id="saveBtn" onclick="saveServiceEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="js/firebase-data.js"></script>
    <script src="js/common.js"></script>
    <script>
        checkAuth();
        document.getElementById('sidebar').innerHTML = buildSidebar('services');
        document.getElementById('userBadge').innerHTML = buildUserBadge();

        let allServices = [];
        let allBookings = [];
        let editingId = null;

        async function loadServices() {
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('mainContent').style.display = 'none';

            try {
                // Load services and bookings in parallel
                const [services, bookings] = await Promise.all([
                    fetchServices(),
                    fetchBookings()
                ]);

                allServices = services;
                allBookings = bookings;

                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';

                document.getElementById('serviceCount').textContent = allServices.length;
                renderServices();
            } catch (error) {
                console.error('Failed to load services:', error);
                document.getElementById('loadingState').innerHTML = `
                    <div style="font-size: 32px; color: var(--danger);">⚠️</div>
                    <div style="color: var(--danger); margin-top: 10px;">Failed to load services</div>
                    <div style="font-size: 12px; color: var(--gray-600); margin-top: 6px;">${error.message}</div>
                    <button class="btn btn-primary" onclick="loadServices()" style="margin-top: 14px;">Retry</button>
                `;
            }
        }

        function getBookingCount(serviceName) {
            return allBookings.filter(b => b.serviceName === serviceName).length;
        }

        function renderServices() {
            const html = allServices.map(s => {
                const bookingCount = getBookingCount(s.name);
                const isActive = s.isActive !== false;

                return `
                    <div class="card" style="margin: 0;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
                            <div style="width: 56px; height: 56px; background: var(--primary-light); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px;">
                                ${s.icon || '🔧'}
                            </div>
                            ${isActive ? '<span class="badge badge-success">ACTIVE</span>' : '<span class="badge badge-gray">INACTIVE</span>'}
                        </div>
                        <h3 style="font-size: 16px; font-weight: 700; margin-bottom: 6px;">${s.name || 'Unnamed Service'}</h3>
                        <p style="font-size: 13px; color: var(--gray-600); margin-bottom: 12px; line-height: 1.5;">${s.description || 'No description'}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding-top: 12px; border-top: 1px solid var(--gray-200);">
                            <div>
                                <div style="font-size: 11px; color: var(--gray-600);">Base Price</div>
                                <div style="font-size: 20px; font-weight: 700; color: var(--primary);">${formatAED(s.basePrice)}</div>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 11px; color: var(--gray-600);">Bookings</div>
                                <div style="font-size: 20px; font-weight: 700;">${bookingCount}</div>
                            </div>
                        </div>
                        <button class="btn btn-primary" style="width: 100%;" onclick="editService('${s.id}')">✏️ Edit Service</button>
                    </div>
                `;
            }).join('');

            document.getElementById('servicesGrid').innerHTML = html;
        }

        function editService(id) {
            const s = allServices.find(x => x.id === id);
            if (!s) return;
            editingId = id;
            document.getElementById('editName').value = s.name || '';
            document.getElementById('editPrice').value = s.basePrice || 0;
            document.getElementById('editDesc').value = s.description || '';
            document.getElementById('editActive').value = (s.isActive !== false).toString();
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingId = null;
        }

        async function saveServiceEdit() {
            if (!editingId) return;

            const s = allServices.find(x => x.id === editingId);
            if (!s) return;

            const updatedData = {
                name: document.getElementById('editName').value,
                basePrice: parseInt(document.getElementById('editPrice').value) || 0,
                description: document.getElementById('editDesc').value,
                isActive: document.getElementById('editActive').value === 'true',
                icon: s.icon || '🔧'
            };

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving...';

            const success = await saveServiceUpdate(editingId, updatedData);

            saveBtn.disabled = false;
            saveBtn.textContent = 'Save Changes';

            if (success) {
                showToast('Service updated successfully!');
                closeEditModal();
                await loadServices();
            } else {
                showToast('Failed to update service', true);
            }
        }

        // Initial load
        loadServices();
    </script>

    <style>
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
    </style>
</body>
</html>
