<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMate Admin - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #5671FF 0%, #3D50DF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-big {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #5671FF 0%, #3D50DF 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 28px;
            margin: 0 auto 16px;
            box-shadow: 0 8px 20px rgba(86, 113, 255, 0.3);
        }
        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: #212529;
        }
        .login-subtitle {
            font-size: 14px;
            color: #6C757D;
            margin-top: 4px;
        }
        .demo-credentials {
            background: #E8ECFF;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #3D50DF;
        }
        .demo-credentials strong {
            display: block;
            margin-bottom: 4px;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #5671FF 0%, #3D50DF 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(86, 113, 255, 0.3);
        }
        .error-message {
            background: #FFEBEE;
            color: #C62828;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        .error-message.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <div class="logo-big">AM</div>
            <div class="login-title">AutoMate Admin</div>
            <div class="login-subtitle">Sign in to manage your platform</div>
        </div>

        <div class="demo-credentials">
            <strong>Demo Login:</strong>
            Email: admin@automate.com<br>
            Password: admin123
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="admin@automate.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="login-btn">Sign In →</button>
            <div id="errorMsg" class="error-message">Invalid email or password</div>
        </form>
    </div>

    <script>
        // If already logged in, redirect to dashboard
        if (localStorage.getItem('admin_logged_in') === 'true') {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (email === 'admin@automate.com' && password === 'admin123') {
                localStorage.setItem('admin_logged_in', 'true');
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.classList.add('active');
                setTimeout(() => errorMsg.classList.remove('active'), 3000);
            }
        });
    </script>
</body>
</html>
